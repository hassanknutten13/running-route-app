<main class="app-shell">
  <section class="map-stage" aria-label="Ruttplanerare">
    <app-map
      class="map-column"
      [center]="currentPosition"
      [route]="selectedRoute"
      (startSelected)="selectStartPoint($event)"
    />

    <div class="control-panel">
      <header class="app-header">
        <p class="eyebrow">Löpplanerare</p>
        <h1>Running Route App</h1>
        @if (isLocating) {
          <p class="location-status">Hämtar din position...</p>
        }
      </header>

      <app-route-planner
        [start]="currentPosition"
        (routesGenerated)="handleRoutesGenerated($event)"
        (useCurrentPosition)="useCurrentPosition()"
      />
      <app-route-summary
        [routes]="routeOptions"
        [selectedRouteId]="selectedRoute?.id ?? null"
        (routeSelected)="selectRoute($event)"
      />
    </div>
  </section>
</main>
