<main class="app-shell">
  <header class="app-header">
    <p class="eyebrow">MVP för löpplanering</p>
    <h1>Running Route App</h1>
    <p class="intro">
      Planera en första mockad löprunda utifrån din position, distans och preferens.
      Kartan använder Leaflet och kan senare kopplas mot en riktig ruttmotor.
    </p>
    @if (isLocating) {
      <p class="location-status">Hämtar din position...</p>
    }
  </header>

  <section class="workspace" aria-label="Ruttplanerare">
    <div class="planner-column">
      <app-route-planner
        [start]="currentPosition"
        (routesGenerated)="handleRoutesGenerated($event)"
      />
      <app-route-summary
        [routes]="routeOptions"
        [selectedRouteId]="selectedRoute?.id ?? null"
        (routeSelected)="selectRoute($event)"
      />
    </div>

    <app-map
      class="map-column"
      [center]="currentPosition"
      [route]="selectedRoute"
    />
  </section>
</main>
