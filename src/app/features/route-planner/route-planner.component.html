<section class="planner-panel" aria-labelledby="planner-title">
  <div>
    <h2 id="planner-title">Planera löprunda</h2>
    <p>Välj distans och vad rutten ska prioritera.</p>
  </div>

  <form class="planner-form" (ngSubmit)="generateRoute()">
    <label class="distance-field" for="distance">
      <span>Distans i km</span>
      <input
        id="distance"
        name="distance"
        type="number"
        min="1"
        max="60"
        step="0.5"
        [(ngModel)]="distanceKm"
      />
    </label>

    <app-preference-selector
      [selected]="preference"
      (selectedChange)="updatePreference($event)"
    />

    @if (errorMessage) {
      <p class="error-message" role="alert">{{ errorMessage }}</p>
    }

    <button class="generate-button" type="submit" [disabled]="isGenerating">
      {{ isGenerating ? 'Genererar och jämför rutter...' : 'Generera rutt' }}
    </button>
  </form>
</section>
