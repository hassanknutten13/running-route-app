<section class="planner-panel" aria-labelledby="planner-title">
  <div>
    <h2 id="planner-title">Planera löprunda</h2>
    <p>Välj distans och vad rutten ska prioritera.</p>
  </div>

  <form class="planner-form" (ngSubmit)="generateRoute()">
    <div class="start-point">
      <div>
        <span>Startpunkt</span>
        <p>{{ start.latitude.toFixed(5) }}, {{ start.longitude.toFixed(5) }}</p>
      </div>
      <button type="button" class="position-button" (click)="requestCurrentPosition()">
        Använd min position
      </button>
    </div>

    <label class="distance-field" for="distance">
      <span>Distans</span>
      <strong>{{ distanceKm }} km</strong>
      <input
        id="distance"
        name="distance"
        type="range"
        min="1"
        max="30"
        step="0.5"
        [(ngModel)]="distanceKm"
      />
    </label>

    <app-preference-selector
      [selected]="preference"
      (selectedChange)="updatePreference($event)"
    />

    @if (errorMessage) {
      <p class="error-message" role="alert">{{ errorMessage }}</p>
    }

    <button class="generate-button" type="submit" [disabled]="isGenerateDisabled">
      {{ generateButtonText }}
    </button>
  </form>
</section>
